[auto_update]
cooldown_days = 7

exclude = "tests/"

# Paralized execution priority (lower is priority):
# formatting > linting & type-checking
# Formatting: 0 - 9
# Linting & Type-checking: 10 - 19

[[repos]]
repo = "builtin"
hooks = [
    { id = "trailing-whitespace", args = ["--markdown-linebreak-ext=md"], priority = 1 },
    { id = "mixed-line-ending", args = ["--fix=lf"], priority = 2 },
    { id = "end-of-file-fixer", priority = 3 },
    { id = "detect-private-key", priority = 9 },
    { id = "check-symlinks", priority = 9 },
    { id = "destroyed-symlinks", priority = 9 },
    { id = "check-merge-conflict", priority = 9 },
    { id = "check-xml", priority = 9 },
    { id = "check-json", priority = 9 },
    { id = "check-toml", priority = 9 },
    { id = "check-yaml", priority = 9 },
    { id = "check-shebang-scripts-are-executable", priority = 9 },
    { id = "check-executables-have-shebangs", priority = 9 },
    { id = "check-case-conflict", priority = 9 },
    { id = "fix-byte-order-marker", priority = 9 },
    { id = "check-added-large-files", args = ["--maxkb=1600"], priority = 9 },
]

[[repos]]
repo = "https://github.com/tox-dev/pyproject-fmt"
rev = "v2.21.1"
hooks = [{ id = "pyproject-fmt", priority = 0 }]

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.13"
hooks = [
    { id = "ruff-format", priority = 0 },
    { id = "ruff-check", args = ["--fix", "--exit-non-zero-on-fix", "--exclude", "tests/"], priority = 10 },
]

[[repos]]
repo = "https://github.com/osprey-oss/deptry.git"
rev = "0.25.1"
hooks = [{ id = "deptry", priority = 10 }]

[[repos]]
repo = "local"
hooks = [
    { id = "ty", name = "ty static type check", entry = "uv run ty check", language = "system", types = ["python"], pass_filenames = false, args = ["src/"], priority = 10 },
]
